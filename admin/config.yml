backend:
  name: git-gateway
  branch: main


media_folder: "assets/uploads"
public_folder: "/assets/uploads"


collections:



# =========================
# ANNOUNCEMENTS
# =========================

- name: "announcements"
  label: "📢 Announcements"

  files:
    - file: "data/announcements.json"
      label: "Announcements"
      name: "announcements"

      fields:
        - label: "Announcements"
          name: "announcements"
          widget: "list"

          fields:
            - { label: "ID", name: "id", widget: "string" }
            - { label: "Date", name: "date", widget: "string" }
            - { label: "Title", name: "title", widget: "string" }
            - label: "Priority"
              name: "priority"
              widget: "select"
              options:
                - Normal
                - Important
            - { label: "Description", name: "description", widget: "text" }



# =========================
# MEMBERS
# =========================

- name: "members"
  label: "👤 Members"

  files:
    - file: "data/members.json"
      label: "Members"
      name: "members"

      fields:
        - label: "Members"
          name: "members"
          widget: "list"

          fields:
            - label: "ID"
              name: "id"
              widget: "string"

            - label: "Name"
              name: "name"
              widget: "string"

            - label: "State"
              name: "state"
              widget: "string"

            - label: "District"
              name: "district"
              widget: "string"

            - label: "Party"
              name: "party"
              widget: "select"
              options:
                - Republican
                - Democrat
                - Independent

            - label: "Committees"
              name: "committees"
              widget: "list"

            - label: "Votes"
              name: "votes"
              widget: "list"

              fields:
                - label: "Roll"
                  name: "roll"
                  widget: "string"

                - label: "Bill"
                  name: "bill"
                  widget: "string"

                - label: "Vote"
                  name: "vote"
                  widget: "select"
                  options:
                    - Yea
                    - Nay
                    - Present
                    - Not Voting



